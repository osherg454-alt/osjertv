<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osjer TV - Pro Edition</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --main: #ff4757; 
            --bg: #0a0a0a; 
            --sidebar: #151515; 
            --accent: #00d2d3;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* צ'אט צדדי */
        .sidebar { 
            width: 320px; 
            background: var(--sidebar); 
            border-left: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        
        .chat-header { 
            padding: 20px; 
            background: #1e1e1e; 
            text-align: center; 
            border-bottom: 1px solid #333; 
            color: var(--main); 
            font-weight: bold; 
            font-size: 1.2rem;
        }
        
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }
        
        .msg { 
            background: #222; 
            padding: 10px; 
            border-radius: 8px; 
            border-right: 3px solid var(--main); 
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }
        
        .msg b { color: var(--accent); display: block; margin-bottom: 2px; }

        .chat-input { 
            padding: 15px; 
            display: flex; 
            gap: 8px; 
            background: #1e1e1e; 
        }

        /* נגן מרכזי */
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 25px; 
            gap: 20px; 
        }
        
        #player-frame { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #333; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        #yt-player, #hls-video { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        
        .controls { 
            display: flex; 
            gap: 12px; 
            background: var(--sidebar); 
            padding: 15px; 
            border-radius: 12px; 
        }
        
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #1e1e1e; 
            color: white; 
            font-size: 15px; 
        }
        
        button { 
            padding: 12px 25px; 
            background: var(--main); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        
        button:hover { background: #ff6b81; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="chat-header">Osjer TV - קהילה</div>
        <div id="chat-box">
            <div class="msg"><b>מערכת:</b> ברוך הבא, אושר! המפתח שלך הופעל.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="mInput" placeholder="כתוב הודעה...">
            <button onclick="sendMsg()">שלח</button>
        </div>
    </div>

    <div class="main">
        <h2 id="title">Osjer TV - המערכת מוכנה לשידור</h2>
        <div id="player-frame">
            <div id="yt-player"></div>
            <video id="hls-video" controls style="display:none;"></video>
        </div>

        <div class="controls">
            <input type="text" id="urlInput" placeholder="הדבק לינק מיוטיוב או כתובת M3U8 (לשידורי חדשות)...">
            <button onclick="smartPlay()">נגן שידור</button>
        </div>
    </div>

<script>
    const API_KEY = 'AIzaSyDAWDe4FPnIr9CGu08og9oQJyhm_EgyojI';
    let ytPlayer;
    let hls = new Hls();
    const hlsVideo = document.getElementById('hls-video');

    // טעינת הנגן של יוטיוב
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', {
            height: '100%',
            width: '100%',
            videoId: 'Dc0L461tX7g', // סרטון פתיחה
            playerVars: { 
                'autoplay': 1, 
                'rel': 0, 
                'origin': window.location.origin,
                'enablejsapi': 1
            }
        });
    }

    function smartPlay() {
        const url = document.getElementById('urlInput').value.trim();
        const ytId = extractId(url);

        if (ytId) {
            hlsVideo.style.display = 'none';
            document.getElementById('yt-player').style.display = 'block';
            ytPlayer.loadVideoById(ytId);
            document.getElementById('title').innerText = "מנגן מיוטיוב...";
        } else if (url.includes('.m3u8')) {
            document.getElementById('yt-player').style.display = 'none';
            hlsVideo.style.display = 'block';
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(hlsVideo);
                hls.on(Hls.Events.MANIFEST_PARSED, () => hlsVideo.play());
            }
            document.getElementById('title').innerText = "מנגן שידור חי (HLS)...";
        }
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function sendMsg() {
        const i = document.getElementById('mInput');
        const box = document.getElementById('chat-box');
        if (!i.value) return;
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>אתה:</b> ${i.value}`;
        box.appendChild(div);
        i.value = "";
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
