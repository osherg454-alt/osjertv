<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Osjer TV - Pro Edition</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --main: #ff4757; --bg: #0a0a0a; --sidebar: #151515; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* נגן מרכזי */
        .content { flex: 3; display: flex; flex-direction: column; padding: 20px; }
        #player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #333; position: relative; }
        #yt-player, #hls-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* ממשק שליטה */
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1e1e1e; color: white; font-size: 16px; }
        button { padding: 12px 25px; background: var(--main); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); }

        /* צ'אט חברי */
        .sidebar { flex: 1; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .chat-title { padding: 15px; background: #222; text-align: center; border-bottom: 1px solid #333; color: var(--main); font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .msg { margin-bottom: 12px; padding: 8px; background: #222; border-radius: 8px; border-right: 3px solid var(--main); }
        .msg b { color: #00d2d3; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="chat-title">קהילת Osjer - צ'אט חופשי</div>
        <div id="chat-box">
            <div class="msg"><b>מערכת:</b> המפתח הופעל בהצלחה! צפייה מהנה.</div>
        </div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="mInput" placeholder="דבר עם כולם...">
            <button onclick="sendMsg()" style="padding:8px;">שלח</button>
        </div>
    </div>

    <div class="content">
        <h2 id="stream-title">Osjer TV - המערכת מוכנה</h2>
        <div id="player-wrapper">
            <div id="yt-player"></div>
            <video id="hls-video" controls style="display:none;"></video>
        </div>

        <div class="controls">
            <input type="text" id="urlInput" placeholder="הדבק לינק מיוטיוב או M3U8 של חדשות...">
            <button onclick="smartPlay()">נגן שידור</button>
        </div>
        <p style="color:#666; font-size:12px; margin-top:10px;">* המערכת משתמשת ב-API הרשמי שלך למניעת שגיאות.</p>
    </div>

<script>
    const API_KEY = 'AIzaSyDAWDe4FPnIr9CGu08og9oQJyhm_EgyojI';
    let ytPlayer;
    let hls = new Hls();
    const hlsVideo = document.getElementById('hls-video');

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', {
            height: '100%',
            width: '100%',
            videoId: 'Dc0L461tX7g', // סרטון פתיחה
            playerVars: { 'autoplay': 1, 'rel': 0, 'origin': window.location.origin }
        });
    }

    function smartPlay() {
        const url = document.getElementById('urlInput').value.trim();
        const ytId = extractId(url);

        if (ytId) {
            hlsVideo.style.display = 'none';
            document.getElementById('yt-player').style.display = 'block';
            ytPlayer.loadVideoById(ytId);
            document.getElementById('stream-title').innerText = "מנגן מיוטיוב...";
        } else if (url.includes('.m3u8')) {
            document.getElementById('yt-player').style.display = 'none';
            hlsVideo.style.display = 'block';
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(hlsVideo);
                hls.on(Hls.Events.MANIFEST_PARSED, () => hlsVideo.play());
            }
            document.getElementById('stream-title').innerText = "מנגן שידור ישיר...";
        }
    }

    function extractId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function sendMsg() {
        const i = document.getElementById('mInput');
        const box = document.getElementById('chat-box');
        if (!i.value) return;
        box.innerHTML += `<div class="msg"><b>אתה:</b> ${i.value}</div>`;
        i.value = "";
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
