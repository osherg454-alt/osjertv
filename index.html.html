<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osjer TV - Live Stream</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --main-color: #ff4757;
            --bg-color: #0f0f0f;
            --sidebar-color: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* עיצוב הצ'אט והצד */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-color);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 20px;
            background-color: #222;
            text-align: center;
            font-weight: bold;
            color: var(--main-color);
            border-bottom: 1px solid #333;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            border-right: 4px solid var(--main-color);
        }

        .chat-input-area {
            padding: 15px;
            background: #222;
            display: flex;
            gap: 5px;
        }

        /* עיצוב הנגן המרכזי */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        #video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            position: relative;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .control-panel {
            background: var(--sidebar-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Osjer TV - Chat</div>
        <div id="chat-box">
            <div class="message">ברוכים הבאים ל-Osjer TV! הדבק לינק כדי להתחיל לצפות.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="כתוב הודעה...">
            <button onclick="sendMessage()">שלח</button>
        </div>
    </div>

    <div class="main-content">
        <h2 id="current-title">ממתין לשידור...</h2>
        
        <div id="video-container">
            <div id="yt-player"></div>
            <video id="hls-video" controls style="display:none;"></video>
        </div>

        <div class="control-panel">
            <input type="text" id="urlInput" placeholder="הדבק כאן לינק מיוטיוב או לינק M3U8...">
            <button onclick="playStream()">נגן עכשיו</button>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDAWDe4FPnIr9CGu08og9oQJyhm_EgyojI';
        let ytPlayer;
        let hls = new Hls();

        // אתחול ה-API של יוטיוב
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: 'Dc0L461tX7g', // סרטון ברירת מחדל
                playerVars: {
                    'autoplay': 1,
                    'modestbranding': 1,
                    'rel': 0
                }
            });
        }

        function playStream() {
            const url = document.getElementById('urlInput').value.trim();
            const ytId = extractYoutubeId(url);
            const videoElement = document.getElementById('hls-video');
            const ytElement = document.getElementById('yt-player');

            if (ytId) {
                // הצגת יוטיוב והסתרת HLS
                videoElement.style.display = 'none';
                ytElement.style.display = 'block';
                ytPlayer.loadVideoById(ytId);
                document.getElementById('current-title').innerText = "מנגן מיוטיוב...";
            } 
            else if (url.includes('.m3u8')) {
                // הצגת HLS והסתרת יוטיוב
                ytElement.style.display = 'none';
                videoElement.style.display = 'block';
                
                if (Hls.isSupported()) {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        videoElement.play();
                    });
                }
                document.getElementById('current-title').innerText = "מנגן שידור ישיר (HLS)...";
            } else {
                alert("לינק לא תקין. נא להזין לינק מיוטיוב או סיומת .m3u8");
            }
        }

        function extractYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const box = document.getElementById('chat-box');
            if (input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.innerHTML = `<b>אתה:</b> ${input.value}`;
                box.appendChild(msg);
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
